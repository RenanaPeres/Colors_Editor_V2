<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor V2</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* --- Base Layout --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: row;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 500px;
            background: #2d2d2d;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            z-index: 10;
            height: 100%;
        }

        .controls-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-footer {
            padding: 15px;
            background: #252525;
            border-top: 1px solid #444;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button-row { display: flex; gap: 8px; }

        .workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                    180deg,
                    #6f8f8f 0%,
                    #5f7f7f 40%,
                    #3f5555 100%
            );

            padding: 40px;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 90vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            background: transparent;
        }

        /* --- UI Components --- */

        .gallery {
            width: 500px;
            height: 200px;
            overflow: hidden;
        }

        #fgGallery img{
            width: 200px;
            height:200px;
        }

        #bgGallery img {
            width: 290px;
            height: 200px;
        }


        .layer-section {
            background: #383838;
            border-radius: 8px;
            border: 1px solid #555;
        }
        .layer-header { background: #444; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #555; color: #fff; }
        .layer-controls { padding: 15px; }



        h3 { margin: 15px 0 8px 0; font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #555; padding-bottom: 4px; }
        h3:first-of-type { margin-top: 0; }

        label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; color: #ccc; }
                                                                              /* Sliders */
        input[type="range"] {
            width: 100%; cursor: pointer; height: 6px; border-radius: 5px;
            appearance: none; outline: none; margin-bottom: 12px; background: #555;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #fff; border: 2px solid #777; transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); background: #007bff; border-color: #007bff; }

        /* Buttons */
        button {
            padding: 12px; background-color: #007bff; color: white; border: none;
            border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%;
            transition: background 0.2s; font-size: 0.9rem;
        }
        button:hover { background-color: #0056b3; }
        button.secondary { background-color: #555; }
        button.secondary:hover { background-color: #666; }

        /* Warning Red for Reset */
        button.warning { background-color: #d9534f; }
        button.warning:hover { background-color: #c9302c; }

        /* Orange for Zip Download */
        button.zip-btn { background-color: #fd7e14; }
        button.zip-btn:hover { background-color: #e36a02; }

        button:disabled { background-color: #333; color: #777; cursor: not-allowed; }
        .value-display { font-family: monospace; color: #fff;}

        .controls-container::-webkit-scrollbar { width: 8px; }
        .controls-container::-webkit-scrollbar-track { background: #2d2d2d; }
        .controls-container::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="controls-container">
        <div class="layer-section">
            <div class="layer-header">1. Foreground</div>
            <div class="layer-controls">
                <div class="gallery" id="fgGallery">
                    <img src="/gallery/fgGallery.jpg.jpeg" />
                </div>
                <h3>Color</h3>
                <label>Hue <span id="bg-val-hue" class="value-display">0°</span></label>
                <input type="range" id="bg-hue" min="0" max="360" value="0">
                <label>Saturation <span id="bg-val-sat" class="value-display">100%</span></label>
                <input type="range" id="bg-sat" min="0" max="200" value="100">
                <h3>Details</h3>
                <label>Brightness <span id="bg-val-brit" class="value-display">100%</span></label>
                <input type="range" id="bg-brit" min="0" max="200" value="100">
                <label>Contrast <span id="bg-val-contrast" class="value-display">100%</span></label>
                <input type="range" id="bg-contrast" min="0" max="200" value="100">
                <label>Blur <span id="bg-val-blur" class="value-display">0px</span></label>
                <input type="range" id="bg-blur" min="0" max="20" value="0" step="0.5">
            </div>
        </div>

        <div class="layer-section">
            <div class="layer-header">2. BackGround</div>
            <div class="layer-controls">
                <div class="gallery" id="bgGallery"><img src="/gallery/bgGallery.jpg.jpeg"></div>
                <h3>Color</h3>
                <label>Hue <span id="fg-val-hue" class="value-display">0°</span></label>
                <input type="range" id="fg-hue" min="0" max="360" value="0">
                <label>Saturation <span id="fg-val-sat" class="value-display">100%</span></label>
                <input type="range" id="fg-sat" min="0" max="200" value="100">
                <h3>Details</h3>
                <label>Brightness <span id="fg-val-brit" class="value-display">100%</span></label>
                <input type="range" id="fg-brit" min="0" max="200" value="100">
                <label>Contrast <span id="fg-val-contrast" class="value-display">100%</span></label>
                <input type="range" id="fg-contrast" min="0" max="200" value="100">
                <label>Blur <span id="fg-val-blur" class="value-display">0px</span></label>
                <input type="range" id="fg-blur" min="0" max="20" value="0" step="0.5">
            </div>
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="button-row">
            <button type="button" class="secondary" id="btnUndo" onclick="undo()" disabled="">↶ Undo</button>
            <button type="button" class="secondary" id="btnRedo" onclick="redo()" disabled="">↷ Redo</button>
            <button type="button" class="warning" onclick="resetFilters()">↺ Reset Filters</button>
        </div>

        <button type="button" class="zip-btn" onclick="downloadZipBundle()">📦 Download Image + Report (.zip)</button>
    </div>
</div>

<div class="workspace">
    <canvas id="photoCanvas"></canvas>
</div>

<script>
    const fgGalleryImg = document.querySelector("#fgGallery img");
    const bgGalleryImg = document.querySelector("#bgGallery img");
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');

    // State Management - Using objects that stay in memory
    const defaultState = { hue: 0, sat: 100, brit: 100, contrast: 100, blur: 0 };
    const bgState = { ...defaultState };
    const fgState = { ...defaultState };

    // History
    let historyStack = [];
    let historyIndex = -1;

    // Images
    let bgImg = new Image();
    let fgImg = new Image();
    let bgLoaded = false;
    let fgLoaded = false;

    // Initialize History
    saveToHistory();

    // --- History Logic ---
    function saveToHistory() {
        if (historyIndex < historyStack.length - 1) {
            historyStack = historyStack.slice(0, historyIndex + 1);
        }
        // Create a deep copy snapshot
        const snapshot = { bg: { ...bgState }, fg: { ...fgState } };
        historyStack.push(snapshot);
        historyIndex++;
        updateButtons();
    }

    function undo() {
        if (historyIndex > 0) { historyIndex--; restoreState(historyStack[historyIndex]); }
    }

    function redo() {
        if (historyIndex < historyStack.length - 1) { historyIndex++; restoreState(historyStack[historyIndex]); }
    }

    function restoreState(snapshot) {
        // FIX: Use Object.assign to keep the reference intact for the sliders
        Object.assign(bgState, snapshot.bg);
        Object.assign(fgState, snapshot.fg);

        syncUI('bg', bgState);
        syncUI('fg', fgState);
        render();
        updateButtons();
    }

    // --- FIXED RESET FUNCTION ---
    function resetFilters() {
        // FIX: Use Object.assign to update existing object, do not create new object
        Object.assign(bgState, defaultState);
        Object.assign(fgState, defaultState);

        saveToHistory();

        syncUI('bg', bgState);
        syncUI('fg', fgState);

        render();
        // Note: Does not clear images
    }

    function updateButtons() {
        document.getElementById('btnUndo').disabled = (historyIndex <= 0);
        document.getElementById('btnRedo').disabled = (historyIndex >= historyStack.length - 1);
    }

    function syncUI(prefix, state) {
        Object.keys(state).forEach(key => {
            const input = document.getElementById(`${prefix}-${key}`);
            const display = document.getElementById(`${prefix}-val-${key}`);
            if (input && display) {
                input.value = state[key];
                let unit = (key === 'hue') ? '°' : (key === 'blur' ? 'px' : '%');
                display.innerText = state[key] + unit;
            }
        });
    }

    // --- Upload Handlers ---
    function handleUpload(inputId, imgObj, loadedFlagName) {
        const el = document.getElementById(inputId);
        if (!el) return;
        el.addEventListener('change', (e) => {const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                imgObj.onload = () => {
                    if(loadedFlagName === 'bgLoaded') { canvas.width = imgObj.width; canvas.height = imgObj.height; }
                    if(loadedFlagName === 'bgLoaded') bgLoaded = true;
                    if(loadedFlagName === 'fgLoaded') fgLoaded = true;
                    render();
                };
                imgObj.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
    handleUpload('bgUpload', bgImg, 'bgLoaded');
    handleUpload('fgUpload', fgImg, 'fgLoaded');

    // --- Inputs ---
    function bindInput(prefix, key, unit) {
        const inputId = `${prefix}-${key}`;
        const displayId = `${prefix}-val-${key}`;
        const input = document.getElementById(inputId);
        const display = document.getElementById(displayId);

        // This determines which object to update.
        // Because we use Object.assign later, 'bgState' reference never changes.
        const targetState = prefix === 'bg' ? bgState : fgState;

        input.addEventListener('input', (e) => {
            targetState[key] = parseFloat(e.target.value);
            display.innerText = targetState[key] + unit;
            render();
        });
        input.addEventListener('change', (e) => saveToHistory());
    }

    ['bg', 'fg'].forEach(prefix => {
        bindInput(prefix, 'hue', '°'); bindInput(prefix, 'sat', '%');
        bindInput(prefix, 'brit', '%'); bindInput(prefix, 'contrast', '%'); bindInput(prefix, 'blur', 'px');
    });

    // --- Render ---
    function getFilterString(state) {
        return `hue-rotate(${state.hue}deg) saturate(${state.sat}%) brightness(${state.brit}%) contrast(${state.contrast}%) blur(${state.blur}px)`;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Canvas rendering (existing)
        if (bgLoaded) {
            ctx.filter = getFilterString(bgState);
            ctx.drawImage(bgImg, 0, 0);
        }

        ctx.filter = 'none';

        if (fgLoaded) {
            ctx.filter = getFilterString(fgState);
            ctx.drawImage(fgImg, 0, 0);
        }

        // 🔥 NEW: update gallery previews
        if (bgGalleryImg) {
            bgGalleryImg.style.filter = getFilterString(bgState);
        }

        if (fgGalleryImg) {
            fgGalleryImg.style.filter = getFilterString(fgState);
        }
    }

    // --- Zip Bundle Logic ---
    function downloadZipBundle() {

        const date = new Date().toLocaleString();
        const reportContent =
            `PHOTO EDITOR REPORT
Generated: ${date}
------------------------------------------
[ LAYER 1: BACKGROUND ]
• Hue:        ${bgState.hue}°
• Saturation: ${bgState.sat}%
• Brightness: ${bgState.brit}%
• Contrast:   ${bgState.contrast}%
• Blur:       ${bgState.blur}px

[ LAYER 2: FOREGROUND ]
• Hue:        ${fgState.hue}°
• Saturation: ${fgState.sat}%
• Brightness: ${fgState.brit}%
• Contrast:   ${fgState.contrast}%
• Blur:       ${fgState.blur}px
------------------------------------------`;

        const imgData = canvas.toDataURL('image/png').split(',')[1];
        const zip = new JSZip();
        zip.file("edited-image.png", imgData, {base64: true});
        zip.file("report.txt", reportContent);

        zip.generateAsync({type:"blob"})
            .then(function(content) {
                saveAs(content, "photo-bundle.zip");
            });
    }
</script>

</body></html>
